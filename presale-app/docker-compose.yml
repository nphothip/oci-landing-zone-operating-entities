services:
  presale:
    build:
      context: ..
      dockerfile: presale-app/Dockerfile
    ports:
      - "3000:3000"
    environment:
      # LLM (free-text mode) — optional; template mode works without any key
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      # pricing
      PRICE_TTL_HOURS: ${PRICE_TTL_HOURS:-24}
    restart: unless-stopped
